name: app_01_end_of_service
description: A new Flutter project for calculating Saudi End of Service reward.
publish_to: 'none'
version: 1.1.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_mobile_ads: ^5.1.0
  intl: ^0.20.2
  in_app_review: ^2.0.9
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/store/icon_512.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/store/launcher_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
