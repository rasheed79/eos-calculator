<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<title>معاينة أصول Google Play — حاسبة مكافأة نهاية الخدمة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: #F4F7FE; margin: 0; padding: 40px; color: #0F172A; }
  h1 { font-size: 28px; }
  h2 { font-size: 18px; color: #64748B; margin-top: 40px; }
  .row { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
  img { border-radius: 16px; box-shadow: 0 8px 30px rgba(15,23,42,0.12); }
  .icon img { width: 160px; }
  .feature img { width: 640px; }
  .shots img { width: 240px; }
  .meta { font-size: 13px; color: #64748B; margin-top: 6px; }
</style>
</head>
<body>
<h1>أصول Google Play — الإصدار 1.1.0</h1>

<h2>أيقونة المتجر (512×512)</h2>
<div class="row icon"><div><img src="icon_512.png"><div class="meta">icon_512.png</div></div></div>

<h2>Feature Graphic (1024×500)</h2>
<div class="row feature"><div><img src="feature_graphic.png"><div class="meta">feature_graphic.png</div></div></div>

<h2>لقطات الشاشة (1080×1920)</h2>
<div class="row shots">
  <div><img src="screenshot_1_home.png"><div class="meta">1 — الإدخال</div></div>
  <div><img src="screenshot_2_result.png"><div class="meta">2 — النتيجة</div></div>
  <div><img src="screenshot_3_breakdown.png"><div class="meta">3 — التفاصيل</div></div>
  <div><img src="screenshot_4_trust.png"><div class="meta">4 — الشفافية</div></div>
</div>
</body>
</html>
