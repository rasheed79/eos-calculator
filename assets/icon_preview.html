<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #888; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

</head>

      <stop offset="0%" style="stop-color:#FFFFFF"/>

  <text x="512" y="575" font-family="Arial, sans-serif" font-size="110" font-weight="bold" fill="#0369A1" text-anchor="middle" dominant-baseline="middle">ر.س</text>
  <circle cx="700" cy="700" r="100" fill="#16A34A"/>
  <polyline points="650,700 685,740 755,660" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</body>
</html>
