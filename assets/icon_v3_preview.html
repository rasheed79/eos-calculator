<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1a1a2e; display: flex; gap: 40px; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .item { text-align: center; }
  .label { color: #aaa; font-family: Arial; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>
  <div class="item">
    <img src="icon_v3.svg" width="280" height="280" style="border-radius:58px;box-shadow:0 16px 48px rgba(109,40,217,0.6)"/>
    <div class="label">280px</div>
  </div>
  <div class="item">
    <img src="icon_v3.svg" width="120" height="120" style="border-radius:25px;box-shadow:0 8px 24px rgba(109,40,217,0.6)"/>
    <div class="label">120px</div>
  </div>
  <div class="item">
    <img src="icon_v3.svg" width="60" height="60" style="border-radius:13px;box-shadow:0 4px 12px rgba(109,40,217,0.5)"/>
    <div class="label">60px</div>
  </div>
</body>
</html>
