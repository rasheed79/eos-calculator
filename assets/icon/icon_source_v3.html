<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1024px; height: 1024px; overflow: hidden; background: #0F172A; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1C3352"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D7AC4"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="greenBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Outer card (white) — the document/form shape -->
  <rect x="152" y="148" width="720" height="728" rx="72" fill="white"/>

  <!-- Blue header strip on card -->
  <rect x="152" y="148" width="720" height="260" rx="72" fill="url(#cardBlue)"/>
  <!-- Cover bottom radius of blue strip -->
  <rect x="152" y="330" width="720" height="78" fill="#0369A1"/>

  <!-- ر.س — Saudi Riyal symbol, large, centered in blue header -->
  <text
    x="512" y="318"
    font-family="'Arial', 'Tahoma', sans-serif"
    font-size="200"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-4"
  >ر.س</text>

  <!-- Form field lines (representing calculation inputs) -->
  <!-- Line 1 -->
  <rect x="216" y="456" width="592" height="48" rx="12" fill="#EEF2F7"/>
  <rect x="216" y="456" width="180" height="48" rx="12" fill="#CBD5E1"/>

  <!-- Line 2 -->
  <rect x="216" y="528" width="592" height="48" rx="12" fill="#EEF2F7"/>
  <rect x="216" y="528" width="280" height="48" rx="12" fill="#CBD5E1"/>

  <!-- Line 3 -->
  <rect x="216" y="600" width="592" height="48" rx="12" fill="#EEF2F7"/>
  <rect x="216" y="600" width="220" height="48" rx="12" fill="#CBD5E1"/>

  <!-- Divider -->
  <rect x="192" y="676" width="640" height="3" rx="2" fill="#E2E8F0"/>

  <!-- Green calculate button -->
  <rect x="216" y="704" width="592" height="112" rx="32" fill="url(#greenBtn)"/>

  <!-- Checkmark on green button -->
  <polyline
    points="430,760 490,820 594,700"
    fill="none"
    stroke="white"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
</body>
</html>
