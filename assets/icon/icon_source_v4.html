<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; }
html, body { width: 1024px; height: 1024px; overflow: hidden; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>

    <radialGradient id="bgGrad" cx="50%" cy="44%" r="58%">
      <stop offset="0%"   stop-color="#0E1F3A"/>
      <stop offset="100%" stop-color="#05090F"/>
    </radialGradient>

    <!-- Gold ring gradient — diagonal for depth -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%"
                    gradientUnits="userSpaceOnUse"
                    x1="150" y1="150" x2="870" y2="870">
      <stop offset="0%"   stop-color="#FFD966"/>
      <stop offset="35%"  stop-color="#F5A623"/>
      <stop offset="70%"  stop-color="#E8870A"/>
      <stop offset="100%" stop-color="#C96C00"/>
    </linearGradient>

    <!-- Dark track for the ring -->
    <linearGradient id="trackGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#122040"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>

    <!-- Blue center fill — rich deep blue -->
    <radialGradient id="blueCenter" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#1A4F94"/>
      <stop offset="60%"  stop-color="#0D2D6B"/>
      <stop offset="100%" stop-color="#071740"/>
    </radialGradient>

    <!-- Glass shine on center circle -->
    <radialGradient id="shine" cx="38%" cy="25%" r="52%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
      <stop offset="70%"  stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow for gold ring -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow under center circle -->
    <filter id="circleShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="24"
                    flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- Text shadow -->
    <filter id="txtShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10"
                    flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Subtle dot glow -->
    <filter id="dotGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- Very subtle outer ambient ring -->
  <circle cx="512" cy="512" r="440"
    fill="none" stroke="#1A3A60" stroke-width="90" opacity="0.20"/>

  <!-- ═══ ARC TRACK (dark background) ═══ -->
  <!-- 270° arc — gap at bottom, from 7:30 to 4:30 going clockwise through top -->
  <!-- Start (7:30): angle=225° SVG = 135° from 3-o'clock
       x = 512 + 390*cos(135°) = 512 - 275.8 = 236
       y = 512 + 390*sin(135°) = 512 + 275.8 = 788
       End (4:30): angle=315° SVG = 45° from 3-o'clock
       x = 512 + 390*cos(45°) = 512 + 275.8 = 788
       y = 512 + 390*sin(45°) = 512 + 275.8 = 788  -->
  <path d="M 236 788 A 390 390 0 1 1 788 788"
    fill="none"
    stroke="#0F2545"
    stroke-width="50"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- ═══ GOLD PROGRESS RING ═══ -->
  <path d="M 236 788 A 390 390 0 1 1 788 788"
    fill="none"
    stroke="url(#goldGrad)"
    stroke-width="38"
    stroke-linecap="round"
    filter="url(#goldGlow)"
  />

  <!-- Ring end-cap dots for premium feel -->
  <circle cx="236" cy="788" r="20" fill="#FFD966" filter="url(#dotGlow)"/>
  <circle cx="788" cy="788" r="20" fill="#E8870A" filter="url(#dotGlow)"/>

  <!-- ═══ CENTER CIRCLE ═══ -->
  <circle cx="512" cy="512" r="330"
    fill="url(#blueCenter)"
    filter="url(#circleShadow)"
  />
  <!-- Glass shine -->
  <circle cx="512" cy="512" r="330" fill="url(#shine)"/>

  <!-- ═══ TEXT: ر.س ═══ -->
  <text
    x="512" y="568"
    font-family="'Tahoma','Arial','Segoe UI','sans-serif'"
    font-size="218"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="auto"
    filter="url(#txtShadow)"
  >ر.س</text>

  <!-- ═══ BOTTOM ACCENT — 3 gold dots in the gap ═══ -->
  <circle cx="476" cy="900" r="9"  fill="#F5A623" opacity="0.55" filter="url(#dotGlow)"/>
  <circle cx="512" cy="914" r="11" fill="#FFD966" opacity="0.80" filter="url(#dotGlow)"/>
  <circle cx="548" cy="900" r="9"  fill="#F5A623" opacity="0.55" filter="url(#dotGlow)"/>

  <!-- ═══ SMALL SPARKLE ACCENTS ═══ -->
  <!-- Top of ring (12 o'clock mark) -->
  <circle cx="512" cy="124" r="7" fill="#FFD966" opacity="0.7" filter="url(#dotGlow)"/>

</svg>
</body>
</html>
